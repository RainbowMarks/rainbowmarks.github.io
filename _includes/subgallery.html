{% if include.id %}
  {% assign gallery = page.[include.id] %}
{% else %}
  {% assign gallery = page.gallery %}
{% endif %}

<div class="gallery masonry-gallery">
  {% for img in gallery %}

  <figure class="gallery-item">

	<header class="gallery-icon">

		<a href="{% picture direct {{ img.image_path }} %}" class="popup"  title="{{ img.image-caption }}" data-caption="{{ img.image-copyright }}">
			{% picture portthumb {{ img.image_path }} %}
		</a>
	</header>	
		
   <figcaption class="gallery-caption">
		<div class="entry-summary" id="{{ img.image-caption }}">
				<h3>{{img.image-caption}}</h3>
					<p>{{img.image-copyright}}</p>
						</div>
					</figcaption>
				</figure>

  {% endfor %}
</div>

<script language="javascript" type="text/javascript">
	
//	_mfpOn('BeforeChange', function(e, prevType, newType) {alert('change'); });
	$('.popup').on('mfpChange', function(e /*, params */) {
	  console.log('Popup changed',  $.magnificPopup.instance.index);

	});
</script>

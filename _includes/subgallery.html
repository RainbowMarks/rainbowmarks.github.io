{% if include.id %}
  {% assign gallery = page.[include.id] %}
{% else %}
  {% assign gallery = page.gallery %}
{% endif %}

<div class="gallery masonry-gallery">
  {% for img in gallery %}

  <figure class="gallery-item">

	<header class="gallery-icon">

		<a href="{% picture direct {{ img.image_path }} %}" class="popup"  title="{{ img.image-caption }}" data-caption="{{ img.image-copyright }}">
			{% picture portthumb {{ img.image_path }} %}
		</a>
	</header>	
		
   <figcaption class="gallery-caption">
		<div class="entry-summary" id="{{ img.image-caption }}">
				<h3>{{img.image-caption}}</h3>
					<p>{{img.image-copyright}}</p>
						</div>
					</figcaption>
				</figure>

  {% endfor %}
</div>

<script language="javascript" type="text/javascript">
	
//	_mfpOn('BeforeChange', function(e, prevType, newType) {alert('change'); });
	$('.popup').on('mfpChange', function(e /*, params */) {
	  //console.log('Popup changed',  $.magnificPopup.instance.index);
	  //console.log('Popup instance',  $.magnificPopup.instance);
	  //load the URL with index as a &param
	  originalUrl = window.location.href.split('?')[0];
	  //load the image if the page loads and a param is passed 
	  window.history.pushState("object or string", "Title", originalUrl + "?rbmphoto=" + $.magnificPopup.instance.index);
	});

	$(document).ready(function ($) {
    $('a.popup').magnificPopup({
      type: 'image',
      gallery: {
        enabled: true,
        navigateByImgClick: true,
        preload: [0, 1] // Will preload 0 - before current, and 1 after the current image
      },
      image: {
        titleSrc: function (item) {
          return item.el.attr('title') + '&nbsp;' + item.el.attr('data-caption');
        }
      }
      // other options
    });
  });

	//check if the url contains a photo
	$( document ).ready(function($) {
		// console.log( "ready!" );

		//console.log('Page Load',  window.location.href.split('?')[1]);
		var loc = window.location.href.indexOf("rbmphoto=")
		if(loc>0)
		{
			//console.log('Found It',  window.location.href.substring(loc));
			var index = window.location.href.substring(loc+9).split("&")[0];
			//console.log('Found Index',  index);
			document.getElementsByClassName('popup')[index].click();
		}
		
	});
</script>

---
layout: photodefault
---

{% assign post = page %}

<article>

  <!-- Post Content -->
  <figure class="gallery-item">

    <header class="gallery-icon">
  
      <a href="{% picture direct {{ page.image_path }} %}" class="popup"  title="{{ page.image-caption }}" data-caption="{{ page.image-copyright }}">
        {% picture portthumb {{ page.image_path }}  --alt {{ page.image-caption }}  %}
      </a>
    </header>	
      
     <figcaption class="gallery-caption">
      <div class="entry-summary" id="{{ img.image-caption }}">
          <h3>{{page.image-caption}}</h3>
          <p>{{page.image-copyright}}</p>
      </div>
    </figcaption>
    </figure>
  
</article>

<!-- Custom Theme JavaScript -->
<script src="{{ site.baseurl }}/js/main.min.js "></script>
<!-- include image popups -->
<script src="{{ site.baseurl }}/js/jquery.magnific-popup.js"></script>

<script type="text/javascript">
  $(document).ready(function ($) {
    $('a.popup').magnificPopup({
      type: 'image',
      gallery: {
        enabled: true,
        navigateByImgClick: true,
        preload: [0, 1] // Will preload 0 - before current, and 1 after the current image
      },
      image: {
        titleSrc: function (item) {
          return item.el.attr('title') + '&nbsp;' + item.el.attr('data-caption');
        }
      }
      // other options
    });
  });
</script>
